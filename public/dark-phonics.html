<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dark Phonics</title>
<style>
:root{--bg:#0b0b12;--bar:#12121c;--ink:#ececf2;--mut:#9a9ab0;--ac:#7c5cff;--line:#23233a;}
*{box-sizing:border-box}html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif;display:flex;flex-direction:column;height:100vh}
header{background:var(--bar);border-bottom:1px solid var(--line);padding:10px 14px 0;flex:0 0 auto}
.brand{font-size:20px;font-weight:700;letter-spacing:.5px;margin:0 0 8px}
.brand .d{color:var(--ac)}
.tabs{display:flex;gap:6px;flex-wrap:wrap}
.tab{background:transparent;color:var(--mut);border:1px solid var(--line);border-bottom:none;
border-radius:9px 9px 0 0;padding:8px 14px;font-size:13.5px;cursor:pointer;white-space:nowrap}
.tab:hover{color:var(--ink);background:#191926}
.tab.on{color:#fff;background:var(--bg);border-color:var(--ac);border-bottom:1px solid var(--bg);font-weight:600}
.sep{width:1px;background:var(--line);margin:2px 4px}
.tab.alt{opacity:.8}
iframe{flex:1 1 auto;width:100%;border:0;background:var(--bg)}
</style></head>
<body>
<header>
  <div class="brand"><span class="d">Dark</span> Phonics</div>
  <div class="tabs" id="tabs">
    <button class="tab on" data-src="/dark-phonics-songs.html">🎵 Songs</button>
    <button class="tab" data-src="/dark-phonics-singalong.html">🎤 Sing-Along Cards</button>
    <button class="tab" data-src="/dark-phonics-books.html">📕 Picture Books</button>
    <button class="tab" data-src="/dark-phonics-readers.html">📗 Easy Readers</button>
    <div class="sep"></div>
    <button class="tab alt" data-src="/pink-phase-songs-teacher.html">Original Songs</button>
    <button class="tab alt" data-src="/pink-readers.html">Original Readers</button>
  </div>
</header>
<iframe id="frame" src="/dark-phonics-songs.html" title="Dark Phonics content"></iframe>
<script>
  var tabs=document.querySelectorAll('.tab'), frame=document.getElementById('frame');
  var saved=localStorage.getItem('dp_tab');
  if(saved){ tabs.forEach(function(t){ if(t.dataset.src===saved){ tabs.forEach(function(x){x.classList.remove('on')}); t.classList.add('on'); frame.src=saved; } }); }
  tabs.forEach(function(t){ t.addEventListener('click',function(){
    tabs.forEach(function(x){x.classList.remove('on')});
    t.classList.add('on'); frame.src=t.dataset.src; localStorage.setItem('dp_tab',t.dataset.src);
  });});
</script>
</body></html>
