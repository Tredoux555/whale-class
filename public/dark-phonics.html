<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dark Phonics</title>
<style>
:root{--bg:#0b0b12;--bar:#12121c;--card:#15151f;--ink:#ececf2;--mut:#9a9ab0;--ac:#7c5cff;--ac2:#16d39a;--y:#f0b85a;--line:#23233a;}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif;line-height:1.5}
header{position:sticky;top:0;z-index:5;background:var(--bar);border-bottom:1px solid var(--line);padding:10px 14px 0}
.brand{font-size:20px;font-weight:700;letter-spacing:.5px;margin:0 0 8px}.brand .d{color:var(--ac)}
.tabs{display:flex;gap:6px;flex-wrap:wrap}
.tab{background:transparent;color:var(--mut);border:1px solid var(--line);border-bottom:none;border-radius:9px 9px 0 0;padding:8px 14px;font-size:13.5px;cursor:pointer;white-space:nowrap;text-decoration:none;display:inline-block}
.tab:hover{color:var(--ink);background:#191926}
.tab.on{color:#fff;background:var(--bg);border-color:var(--ac);font-weight:600}
.sep{width:1px;background:var(--line);margin:2px 4px}.tab.alt{opacity:.85}
#content{padding:0 16px 80px}.wrap{max-width:760px;margin:0 auto}
h1{font-size:30px;margin:30px 0 4px}h1 .d{color:var(--ac)}.sub{color:var(--mut);margin:0 0 8px}
.note{background:var(--card);border:1px solid #262636;border-radius:12px;padding:14px 16px;color:var(--mut);font-size:14px;margin:18px 0 28px}.note b{color:var(--ink)}
.song,.book{background:var(--card);border:1px solid #232333;border-radius:14px;padding:16px;margin:0 0 22px}
.hd{display:flex;gap:10px;align-items:baseline;margin-bottom:4px;flex-wrap:wrap}
.ls{background:var(--ac);color:#fff;font-size:12px;font-weight:600;padding:2px 8px;border-radius:999px}.ti,.lk{color:var(--mut);font-size:13.5px}
.catch,.title{color:var(--y);font-size:18px;font-weight:600;margin:2px 0 12px}
.dec{background:#10331f;color:var(--ac2);font-size:11px;padding:2px 8px;border-radius:999px;font-weight:600}
.pg{border-top:1px solid #21212f;padding:12px 0 4px}.pgh{font-size:11px;letter-spacing:.6px;text-transform:uppercase;color:var(--ac);font-weight:600}
.cref{color:var(--ac2);text-transform:none;letter-spacing:0;font-weight:400}.txt{font-size:18px;font-weight:600;margin:4px 0 8px}
.box{margin:8px 0}.lab{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.cp{background:#23233a;color:var(--ink);border:1px solid #34344e;border-radius:7px;font-size:12px;padding:3px 12px;cursor:pointer}
.cp:hover{background:#2d2d4a}.cp.ok{background:var(--ac2);color:#022;border-color:var(--ac2)}
pre{white-space:pre-wrap;word-wrap:break-word;background:#0e0e16;border:1px solid #21212f;border-radius:9px;padding:10px 12px;margin:0;font-size:12.5px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;color:#dcdce8}
audio{height:36px;max-width:100%}
.loading{color:var(--mut);padding:40px 0;text-align:center}
details.box>summary{outline:none}details.box>summary::-webkit-details-marker{display:none}details.box>summary::marker{content:''}details.box>summary:hover{color:var(--ink)}
.dpsearch{margin:2px 0 10px}
#dpq{width:100%;background:#0e0e16;border:1px solid var(--line);border-radius:10px;color:var(--ink);font-size:15px;padding:10px 12px;outline:none;-webkit-appearance:none}
#dpq:focus{border-color:var(--ac)}
#dpq::placeholder{color:var(--mut)}
#dphint{display:none;color:var(--mut);font-size:13px;padding:0 0 10px}
</style></head>
<body>
<header>
  <div class="brand"><span class="d">Dark</span> Phonics</div>
  <div class="dpsearch"><input id="dpq" type="search" inputmode="search" autocomplete="off" placeholder="Find a letter, sound or word…"></div>
  <div id="dphint"></div>
  <div class="tabs">
    <button class="tab on" data-src="/dark-phonics-songs.html">🎵 Songs</button>
    <button class="tab" data-src="/dark-phonics-singalong.html">🎤 Sing-Along Cards</button>
    <button class="tab" data-src="/dark-phonics-books.html">📕 Picture Books</button>
    <button class="tab" data-src="/dark-phonics-readers.html">📗 Easy Readers</button>
    <a class="tab" href="/dark-phonics-bulk.html" target="_blank" rel="noopener">⬇ Bulk download ↗</a>
    <button class="tab" data-src="/dark-phonics-creation.html">🎛 Creation</button>
    <div class="sep"></div>
    <a class="tab alt" href="/pink-phase-songs-teacher.html" target="_blank" rel="noopener">Original Songs ↗</a>
    <a class="tab alt" href="/pink-readers.html" target="_blank" rel="noopener">Original Readers ↗</a>
  </div>
</header>
<div id="content"><div class="wrap"><div class="loading">Loading…</div></div></div>
<script>
var content=document.getElementById('content');
var tabs=document.querySelectorAll('button.tab');
var dpq=document.getElementById('dpq');
function dpMatch(card,term){
  if(!term)return true;
  var sr=(card.textContent||'').toLowerCase();
  var lm=sr.match(/·\s*([a-z]{1,3})\s*[—-]/);
  var letter=lm?lm[1]:'';
  if(term.length===1)return letter?(letter.charAt(0)===term):(sr.indexOf(term)>=0);
  return sr.indexOf(term)>=0;
}
function applyFilter(){
  if(!dpq)return;
  var term=(dpq.value||'').trim().toLowerCase();
  var cards=content.querySelectorAll('.song,.book');var shown=0;
  cards.forEach(function(c){var ok=dpMatch(c,term);c.style.display=ok?'':'none';if(ok)shown++;});
  ['.note','h1','.sub'].forEach(function(s){var el=content.querySelector(s);if(el)el.style.display=term?'none':'';});
  var hint=document.getElementById('dphint');
  if(hint){var no=term&&shown===0;hint.textContent=no?('No lessons match “'+dpq.value.trim()+'”'):'';hint.style.display=no?'block':'none';}
}
if(dpq)dpq.addEventListener('input',applyFilter);
function revealVideos(){
  fetch('/api/montree/phonics-videos',{cache:'no-store'}).then(function(r){return r.json();}).then(function(j){
    var up=(j&&j.uploaded)||[], pics=(j&&j.pictures)||[], fcs=(j&&j.flashcards)||[];
    content.querySelectorAll('.dp-video[data-lesson]').forEach(function(d){
      if(up.indexOf(parseInt(d.getAttribute('data-lesson'),10))>=0){
        var v=d.querySelector('video');
        if(v&&!v.getAttribute('src')){ v.src=d.getAttribute('data-vsrc'); }
        d.style.display='block';
      }
    });
    // Pictures + flashcard PDFs — reveal the same way videos are revealed.
    content.querySelectorAll('.dp-pic[data-lesson]').forEach(function(d){
      var n=parseInt(d.getAttribute('data-lesson'),10);
      if(pics.indexOf(n)>=0){
        var im=d.querySelector('img');
        if(im&&!im.getAttribute('src')){ im.src=d.getAttribute('data-psrc'); }
        d.style.display='block';
        if(fcs.indexOf(n)>=0){ var fl=d.querySelector('.dp-fc-dl'); if(fl){ fl.style.display='inline-block'; } }
      }
    });
    var md=document.getElementById('dp-master');
    if(md){ md.style.display=(j&&j.master)?'inline-block':'none'; }
  }).catch(function(){});
}
function load(url){
  content.innerHTML='<div class="wrap"><div class="loading">Loading…</div></div>';
  fetch(url).then(function(r){return r.text();}).then(function(t){
    var doc=new DOMParser().parseFromString(t,'text/html');
    var w=doc.querySelector('.wrap');
    content.innerHTML='<div class="wrap">'+(w?w.innerHTML:'Could not load this set.')+'</div>';
    window.scrollTo(0,0);
    revealVideos();
    applyFilter();
  }).catch(function(){ content.innerHTML='<div class="wrap"><div class="loading">Could not load. <a style="color:var(--ac)" href="'+url+'">Open directly ↗</a></div></div>'; });
}
tabs.forEach(function(t){ t.addEventListener('click',function(){
  tabs.forEach(function(x){x.classList.remove('on')}); t.classList.add('on');
  localStorage.setItem('dp_tab',t.dataset.src); load(t.dataset.src);
});});
// copy buttons (delegated, works for injected content)
document.addEventListener('click',function(e){
  if(e.target&&e.target.classList&&e.target.classList.contains('cp')){
    var box=e.target.closest('.box'); var pre=box&&box.querySelector('pre');
    if(pre){navigator.clipboard.writeText(pre.textContent).then(function(){
      e.target.textContent='copied';e.target.classList.add('ok');
      setTimeout(function(){e.target.textContent='copy';e.target.classList.remove('ok')},1200);
    });}
  }
});
var saved=localStorage.getItem('dp_tab');
var start=null;
if(saved){tabs.forEach(function(t){if(t.dataset.src===saved){tabs.forEach(function(x){x.classList.remove('on')});t.classList.add('on');start=saved;}});}
load(start||'/dark-phonics-songs.html');
</script>
</body></html>
