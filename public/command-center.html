<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Command Center</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * {
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #0f172a;
            color: #e2e8f0;
        }

        .card-hover {
            transition: all 0.3s ease;
        }

        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .status-live {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .status-active {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
        }

        .status-planning {
            background: rgba(139, 92, 246, 0.2);
            color: #a78bfa;
        }

        .social-icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            border: 1.5px solid;
        }

        .social-icon-btn:hover {
            transform: scale(1.1);
        }

        .social-icon-active {
            color: white;
            border-color: currentColor;
        }

        .social-icon-inactive {
            color: #64748b;
            border-color: #475569;
            background: rgba(100, 116, 139, 0.1);
        }

        .sidebar-item {
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
        }

        .sidebar-item:hover {
            background: rgba(71, 85, 105, 0.5);
        }

        .sidebar-item-active {
            background: rgba(71, 85, 105, 0.8);
            border-left-color: currentColor;
        }

        .table-row-hover:hover {
            background: rgba(71, 85, 105, 0.3);
        }

        .brain-status-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .gradient-text {
            background: linear-gradient(135deg, #10b981, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 to-slate-800 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // Lucide React Icon Components
        const Icon = ({ name, size = 24, className = "" }) => {
            const iconMap = {
                youtube: lucide.Youtube,
                facebook: lucide.Facebook,
                instagram: lucide.Instagram,
                tiktok: lucide.Music,
                twitter: lucide.Twitter,
                linkedin: lucide.Linkedin,
                github: lucide.Github,
                menu: lucide.Menu,
                x: lucide.X,
                zap: lucide.Zap,
                clock: lucide.Clock,
                checkCircle: lucide.CheckCircle2,
                alertCircle: lucide.AlertCircle,
                globe: lucide.Globe,
                externalLink: lucide.ExternalLink,
                star: lucide.Star,
            };

            const IconComponent = iconMap[name];
            return IconComponent ? <IconComponent size={size} className={className} /> : null;
        };

        // Project data
        const projectsData = [
            {
                id: 'montree',
                name: 'Montree',
                domain: 'montree.xyz',
                description: 'Montessori Classroom Management tool',
                status: 'Live',
                statusType: 'live',
                color: '#2DD4A8',
                colorClass: 'emerald',
                email: 'hello@montree.xyz',
                infrastructure: {
                    registrar: 'GoDaddy',
                    dns: 'Cloudflare',
                    hosting: 'Railway'
                },
                socials: {
                    youtube: { name: 'YouTube', handle: '@montreexyz', url: 'https://youtube.com/@montreexyz', active: true },
                    facebook: { name: 'Facebook', handle: null, url: null, active: false },
                    instagram: { name: 'Instagram', handle: null, url: null, active: false },
                    tiktok: { name: 'TikTok', handle: null, url: null, active: false },
                    twitter: { name: 'X/Twitter', handle: null, url: null, active: false },
                    linkedin: { name: 'LinkedIn', handle: null, url: null, active: false },
                    github: { name: 'GitHub', handle: null, url: null, active: false }
                },
                brainStatus: {
                    lastSession: '#162',
                    lastUpdated: 'Feb 10, 2026'
                }
            },
            {
                id: 'jeffy',
                name: 'Jeffy',
                domain: 'Coming Soon',
                description: 'Details to be determined',
                status: 'Active',
                statusType: 'active',
                color: '#F59E0B',
                colorClass: 'amber',
                email: 'contact@jeffy.dev',
                infrastructure: {
                    registrar: 'TBD',
                    dns: 'TBD',
                    hosting: 'TBD'
                },
                socials: {
                    youtube: { name: 'YouTube', handle: null, url: null, active: false },
                    facebook: { name: 'Facebook', handle: null, url: null, active: false },
                    instagram: { name: 'Instagram', handle: null, url: null, active: false },
                    tiktok: { name: 'TikTok', handle: null, url: null, active: false },
                    twitter: { name: 'X/Twitter', handle: null, url: null, active: false },
                    linkedin: { name: 'LinkedIn', handle: null, url: null, active: false },
                    github: { name: 'GitHub', handle: null, url: null, active: false }
                },
                brainStatus: {
                    lastSession: '#28',
                    lastUpdated: '1 week ago'
                }
            },
            {
                id: 'sentinel',
                name: 'Project Sentinel',
                domain: 'sentinel.dev',
                description: 'Upcoming innovative project',
                status: 'Planning',
                statusType: 'planning',
                color: '#8B5CF6',
                colorClass: 'violet',
                email: 'info@sentinel.dev',
                infrastructure: {
                    registrar: 'TBD',
                    dns: 'TBD',
                    hosting: 'TBD'
                },
                socials: {
                    youtube: { name: 'YouTube', handle: null, url: null, active: false },
                    facebook: { name: 'Facebook', handle: null, url: null, active: false },
                    instagram: { name: 'Instagram', handle: null, url: null, active: false },
                    tiktok: { name: 'TikTok', handle: null, url: null, active: false },
                    twitter: { name: 'X/Twitter', handle: null, url: null, active: false },
                    linkedin: { name: 'LinkedIn', handle: null, url: null, active: false },
                    github: { name: 'GitHub', handle: null, url: null, active: false }
                },
                brainStatus: {
                    lastSession: 'N/A',
                    lastUpdated: 'Not started'
                }
            }
        ];

        // Social platform configuration
        const socialPlatforms = [
            { key: 'youtube', name: 'YouTube', icon: 'youtube' },
            { key: 'facebook', name: 'Facebook', icon: 'facebook' },
            { key: 'instagram', name: 'Instagram', icon: 'instagram' },
            { key: 'tiktok', name: 'TikTok', icon: 'tiktok' },
            { key: 'twitter', name: 'X/Twitter', icon: 'twitter' },
            { key: 'linkedin', name: 'LinkedIn', icon: 'linkedin' },
            { key: 'github', name: 'GitHub', icon: 'github' }
        ];

        // Main App Component
        function ProjectCommandCenter() {
            const [selectedProject, setSelectedProject] = useState('montree');
            const [activeTab, setActiveTab] = useState('projects');
            const [sidebarOpen, setSidebarOpen] = useState(true);

            const currentProject = projectsData.find(p => p.id === selectedProject);

            const getStatusColor = (status) => {
                switch(status) {
                    case 'Live': return 'status-live';
                    case 'Active': return 'status-active';
                    case 'Planning': return 'status-planning';
                    default: return 'status-active';
                }
            };

            const getSocialColor = (colorCode) => {
                // Map hex to tailwind equivalent or return inline style
                return colorCode;
            };

            return (
                <div className="flex h-screen bg-slate-900">
                    {/* Sidebar */}
                    <div className={`${sidebarOpen ? 'w-64' : 'w-0'} bg-slate-800 border-r border-slate-700 flex flex-col transition-all duration-300 overflow-hidden`}>
                        <div className="p-6 border-b border-slate-700">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-emerald-400 to-blue-500 flex items-center justify-center">
                                    <Icon name="zap" size={20} className="text-white" />
                                </div>
                                <div>
                                    <h1 className="text-lg font-bold text-white">Command</h1>
                                    <p className="text-xs text-slate-400">Center</p>
                                </div>
                            </div>
                        </div>

                        <div className="flex-1 overflow-y-auto p-4 space-y-2">
                            {projectsData.map(project => (
                                <div
                                    key={project.id}
                                    onClick={() => setSelectedProject(project.id)}
                                    className={`sidebar-item p-3 rounded-lg cursor-pointer pl-4 ${
                                        selectedProject === project.id ? 'sidebar-item-active' : ''
                                    }`}
                                    style={selectedProject === project.id ? { borderLeftColor: project.color } : {}}
                                >
                                    <div className="flex items-start gap-3">
                                        <div
                                            className="w-2 h-2 rounded-full mt-2 flex-shrink-0"
                                            style={{ backgroundColor: project.color }}
                                        ></div>
                                        <div className="flex-1 min-w-0">
                                            <p className="font-600 text-sm text-white truncate">{project.name}</p>
                                            <p className="text-xs text-slate-400 truncate">{project.domain}</p>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>

                        <div className="p-4 border-t border-slate-700 bg-slate-900">
                            <div className="text-xs text-slate-400 text-center">
                                <p className="font-500">Tredoux</p>
                                <p>Project Manager</p>
                            </div>
                        </div>
                    </div>

                    {/* Main Content */}
                    <div className="flex-1 flex flex-col overflow-hidden">
                        {/* Header */}
                        <div className="bg-slate-800 border-b border-slate-700 px-8 py-6">
                            <div className="flex items-center justify-between">
                                <div className="flex items-center gap-6">
                                    <button
                                        onClick={() => setSidebarOpen(!sidebarOpen)}
                                        className="p-2 hover:bg-slate-700 rounded-lg transition-colors"
                                    >
                                        <Icon name={sidebarOpen ? "x" : "menu"} size={20} className="text-slate-300" />
                                    </button>
                                    <div>
                                        <h2 className="text-3xl font-bold gradient-text">Project Command Center</h2>
                                        <p className="text-sm text-slate-400 mt-1">Manage projects and social presence</p>
                                    </div>
                                </div>
                                <div className="text-right">
                                    <p className="text-slate-300 font-500">Tredoux</p>
                                    <p className="text-xs text-slate-500">3 Projects</p>
                                </div>
                            </div>
                        </div>

                        {/* Tabs */}
                        <div className="bg-slate-800 border-b border-slate-700 px-8">
                            <div className="flex gap-8">
                                <button
                                    onClick={() => setActiveTab('projects')}
                                    className={`py-4 font-600 text-sm border-b-2 transition-colors ${
                                        activeTab === 'projects'
                                            ? 'border-emerald-400 text-white'
                                            : 'border-transparent text-slate-400 hover:text-slate-300'
                                    }`}
                                >
                                    Projects
                                </button>
                                <button
                                    onClick={() => setActiveTab('socials')}
                                    className={`py-4 font-600 text-sm border-b-2 transition-colors ${
                                        activeTab === 'socials'
                                            ? 'border-emerald-400 text-white'
                                            : 'border-transparent text-slate-400 hover:text-slate-300'
                                    }`}
                                >
                                    Socials Overview
                                </button>
                            </div>
                        </div>

                        {/* Content Area */}
                        <div className="flex-1 overflow-y-auto p-8">
                            {activeTab === 'projects' ? (
                                <div className="max-w-7xl">
                                    {/* Project Detail View */}
                                    <div className="mb-8">
                                        <div className={`bg-gradient-to-r from-slate-800 to-slate-700 rounded-2xl p-8 border border-slate-700 card-hover`}
                                            style={{
                                                borderColor: currentProject.color + '40',
                                                boxShadow: `0 0 30px ${currentProject.color}20`
                                            }}>
                                            <div className="flex items-start justify-between mb-6">
                                                <div>
                                                    <div className="flex items-center gap-4 mb-3">
                                                        <h3 className="text-4xl font-bold text-white">{currentProject.name}</h3>
                                                        <span className={`status-badge ${getStatusColor(currentProject.status)}`}>
                                                            {currentProject.status}
                                                        </span>
                                                    </div>
                                                    <p className="text-slate-400">{currentProject.description}</p>
                                                </div>
                                                <div
                                                    className="w-20 h-20 rounded-xl flex items-center justify-center text-white text-3xl font-bold"
                                                    style={{ backgroundColor: currentProject.color + '30' }}
                                                >
                                                    {currentProject.name[0]}
                                                </div>
                                            </div>

                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                                                <div>
                                                    <p className="text-xs font-600 text-slate-400 uppercase tracking-wide mb-2">Domain</p>
                                                    <div className="flex items-center gap-2">
                                                        <Icon name="globe" size={16} className="text-slate-400" />
                                                        <a href={`https://${currentProject.domain}`} target="_blank" rel="noopener noreferrer" className="text-emerald-400 hover:text-emerald-300 transition-colors font-500">
                                                            {currentProject.domain}
                                                        </a>
                                                    </div>
                                                </div>
                                                <div>
                                                    <p className="text-xs font-600 text-slate-400 uppercase tracking-wide mb-2">Email</p>
                                                    <p className="text-slate-300 font-500">{currentProject.email}</p>
                                                </div>
                                            </div>

                                            <div className="mb-8 pb-8 border-b border-slate-700">
                                                <p className="text-xs font-600 text-slate-400 uppercase tracking-wide mb-4">Infrastructure</p>
                                                <div className="grid grid-cols-3 gap-4">
                                                    <div className="bg-slate-900 rounded-lg p-4">
                                                        <p className="text-xs text-slate-500 mb-1">Registrar</p>
                                                        <p className="text-white font-600">{currentProject.infrastructure.registrar}</p>
                                                    </div>
                                                    <div className="bg-slate-900 rounded-lg p-4">
                                                        <p className="text-xs text-slate-500 mb-1">DNS</p>
                                                        <p className="text-white font-600">{currentProject.infrastructure.dns}</p>
                                                    </div>
                                                    <div className="bg-slate-900 rounded-lg p-4">
                                                        <p className="text-xs text-slate-500 mb-1">Hosting</p>
                                                        <p className="text-white font-600">{currentProject.infrastructure.hosting}</p>
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="mb-8 pb-8 border-b border-slate-700">
                                                <p className="text-xs font-600 text-slate-400 uppercase tracking-wide mb-4">Social Media Accounts</p>
                                                <div className="flex flex-wrap gap-3">
                                                    {Object.entries(currentProject.socials).map(([key, social]) => (
                                                        <button
                                                            key={key}
                                                            onClick={() => social.active && social.url && window.open(social.url, '_blank')}
                                                            className={`social-icon-btn ${social.active ? 'social-icon-active' : 'social-icon-inactive'} cursor-pointer`}
                                                            style={social.active ? { color: currentProject.color, borderColor: currentProject.color } : {}}
                                                            title={social.active ? `${social.name}: ${social.handle}` : `${social.name} (Not created)`}
                                                        >
                                                            <Icon name={key} size={18} />
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>

                                            <div>
                                                <p className="text-xs font-600 text-slate-400 uppercase tracking-wide mb-4">Brain Status</p>
                                                <div className="grid grid-cols-2 gap-4">
                                                    <div className="bg-slate-900 rounded-lg p-4 flex items-center gap-3">
                                                        <div className="brain-status-pulse w-2 h-2 rounded-full" style={{ backgroundColor: currentProject.color }}></div>
                                                        <div>
                                                            <p className="text-xs text-slate-500">Last Session</p>
                                                            <p className="text-white font-600">{currentProject.brainStatus.lastSession}</p>
                                                        </div>
                                                    </div>
                                                    <div className="bg-slate-900 rounded-lg p-4 flex items-center gap-3">
                                                        <Icon name="clock" size={16} className="text-slate-500" />
                                                        <div>
                                                            <p className="text-xs text-slate-500">Last Updated</p>
                                                            <p className="text-white font-600">{currentProject.brainStatus.lastUpdated}</p>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            ) : (
                                // Socials Overview Tab
                                <div className="max-w-7xl">
                                    <h3 className="text-2xl font-bold text-white mb-6">All Social Media Accounts</h3>
                                    <div className="bg-slate-800 rounded-xl border border-slate-700 overflow-hidden">
                                        <table className="w-full">
                                            <thead>
                                                <tr className="border-b border-slate-700 bg-slate-900">
                                                    <th className="px-6 py-4 text-left text-xs font-600 text-slate-400 uppercase tracking-wide">Project</th>
                                                    <th className="px-6 py-4 text-left text-xs font-600 text-slate-400 uppercase tracking-wide">Status</th>
                                                    {socialPlatforms.map(platform => (
                                                        <th key={platform.key} className="px-6 py-4 text-center text-xs font-600 text-slate-400 uppercase tracking-wide">
                                                            {platform.name}
                                                        </th>
                                                    ))}
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {projectsData.map(project => (
                                                    <tr key={project.id} className="border-b border-slate-700 table-row-hover">
                                                        <td className="px-6 py-4">
                                                            <div className="flex items-center gap-3">
                                                                <div
                                                                    className="w-3 h-3 rounded-full"
                                                                    style={{ backgroundColor: project.color }}
                                                                ></div>
                                                                <div>
                                                                    <p className="font-600 text-white">{project.name}</p>
                                                                    <p className="text-xs text-slate-400">{project.domain}</p>
                                                                </div>
                                                            </div>
                                                        </td>
                                                        <td className="px-6 py-4">
                                                            <span className={`status-badge ${getStatusColor(project.status)}`}>
                                                                {project.status}
                                                            </span>
                                                        </td>
                                                        {socialPlatforms.map(platform => {
                                                            const social = project.socials[platform.key];
                                                            return (
                                                                <td key={platform.key} className="px-6 py-4 text-center">
                                                                    {social.active ? (
                                                                        <a
                                                                            href={social.url}
                                                                            target="_blank"
                                                                            rel="noopener noreferrer"
                                                                            className="inline-flex items-center gap-2 px-3 py-1 rounded-lg transition-all hover:bg-slate-700"
                                                                            style={{ color: project.color }}
                                                                        >
                                                                            <Icon name={platform.icon} size={16} />
                                                                            <span className="text-xs font-500">{social.handle}</span>
                                                                        </a>
                                                                    ) : (
                                                                        <div className="inline-flex items-center justify-center w-8 h-8 rounded-lg bg-slate-900 text-slate-600">
                                                                            <Icon name={platform.icon} size={14} />
                                                                        </div>
                                                                    )}
                                                                </td>
                                                            );
                                                        })}
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>

                                    <div className="mt-8 grid grid-cols-1 md:grid-cols-3 gap-6">
                                        <div className="bg-gradient-to-br from-emerald-900 to-emerald-800 rounded-xl p-6 border border-emerald-700">
                                            <div className="flex items-center justify-between mb-2">
                                                <p className="text-emerald-200 text-sm font-600">Active Accounts</p>
                                                <Icon name="checkCircle" size={20} className="text-emerald-400" />
                                            </div>
                                            <p className="text-3xl font-bold text-white">1</p>
                                            <p className="text-xs text-emerald-200 mt-2">YouTube (Montree)</p>
                                        </div>
                                        <div className="bg-gradient-to-br from-blue-900 to-blue-800 rounded-xl p-6 border border-blue-700">
                                            <div className="flex items-center justify-between mb-2">
                                                <p className="text-blue-200 text-sm font-600">Planned Accounts</p>
                                                <Icon name="star" size={20} className="text-blue-400" />
                                            </div>
                                            <p className="text-3xl font-bold text-white">6</p>
                                            <p className="text-xs text-blue-200 mt-2">Ready to create</p>
                                        </div>
                                        <div className="bg-gradient-to-br from-violet-900 to-violet-800 rounded-xl p-6 border border-violet-700">
                                            <div className="flex items-center justify-between mb-2">
                                                <p className="text-violet-200 text-sm font-600">Total Coverage</p>
                                                <Icon name="zap" size={20} className="text-violet-400" />
                                            </div>
                                            <p className="text-3xl font-bold text-white">7</p>
                                            <p className="text-xs text-violet-200 mt-2">Social platforms</p>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // Render app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ProjectCommandCenter />);
    </script>
</body>
</html>
