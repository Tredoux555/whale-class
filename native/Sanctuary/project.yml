# XcodeGen project spec for the Sanctuary app.
#
# Product name: "Sanctuary". The crypto module type names (SanctuaryCrypto, …)
# are stable across client + server (lib/sanctuary-e2e) so the parity vectors
# line up — that codename was always "Sanctuary", and now the product is too.
#
# WHY XcodeGen: a hand-written .xcodeproj is UUID-fragile. This declarative spec
# is human-reviewable and generates a clean project. `sources:` uses folder
# globs, so adding Swift files never leaves a dangling project reference.
#
# Build:  brew install xcodegen && cd native/Sanctuary && xcodegen generate
# Then:   open Sanctuary.xcodeproj   (see README_BUILD.md)

name: Sanctuary

options:
  bundleIdPrefix: xyz.montree
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  Sodium:
    # swift-sodium = the same libsodium the TS reference + KAT vectors use.
    # Verified building at 0.11.0 (Xcode 26.3); crypto XCTest green.
    url: https://github.com/jedisct1/swift-sodium
    from: "0.11.0"

targets:
  Sanctuary:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sanctuary    # source group + Resources/Assets.xcassets (app icon)
    dependencies:
      - package: Sodium
        product: Sodium
    settings:
      base:
        INFOPLIST_FILE: Sanctuary/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_BUNDLE_IDENTIFIER: xyz.montree.sanctuary
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: "NO"
        TARGETED_DEVICE_FAMILY: "1" # iPhone
        CODE_SIGN_STYLE: Automatic
        ENABLE_USER_SCRIPT_SANDBOXING: "YES"

  SanctuaryTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests
    dependencies:
      - target: Sanctuary
      - package: Sodium
        product: Sodium
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: xyz.montree.sanctuary.cryptotests
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: "YES"

schemes:
  Sanctuary:
    build:
      targets:
        Sanctuary: all
        SanctuaryTests: [test]
    test:
      targets:
        - SanctuaryTests
