# XcodeGen project spec for the Lyf Coach app.
#
# Product name: "Lyf Coach". Internal crypto module shares the "Sanctuary"
# codename with the server library (lib/sanctuary-e2e) — the type names
# (SanctuaryCrypto, …) are intentionally stable across client + server so the
# parity vectors line up. The user-facing app is Lyf Coach everywhere it shows.
#
# WHY XcodeGen: a hand-written .xcodeproj is UUID-fragile. This declarative spec
# is human-reviewable and generates a clean project. `sources:` uses folder
# globs, so adding Swift files never leaves a dangling project reference.
#
# Build:  brew install xcodegen && cd native/LyfCoach && xcodegen generate
# Then:   open LyfCoach.xcodeproj   (see README_BUILD.md)

name: LyfCoach

options:
  bundleIdPrefix: xyz.montree
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  Sodium:
    # swift-sodium = the same libsodium the TS reference + KAT vectors use.
    # Pin to a known 0.9.x; verify the latest tag before shipping.
    url: https://github.com/jedisct1/swift-sodium
    from: "0.9.1"

targets:
  LyfCoach:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sanctuary    # internal source group (codename); product is Lyf Coach
    dependencies:
      - package: Sodium
        product: Sodium
    settings:
      base:
        INFOPLIST_FILE: Sanctuary/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: xyz.montree.lyfcoach
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: "NO"
        TARGETED_DEVICE_FAMILY: "1" # iPhone
        CODE_SIGN_STYLE: Automatic
        ENABLE_USER_SCRIPT_SANDBOXING: "YES"

  LyfCoachTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests
    dependencies:
      - target: LyfCoach
      - package: Sodium
        product: Sodium
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: xyz.montree.lyfcoach.cryptotests
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: "YES"

schemes:
  LyfCoach:
    build:
      targets:
        LyfCoach: all
        LyfCoachTests: [test]
    test:
      targets:
        - LyfCoachTests
