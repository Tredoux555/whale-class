<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;1,500;1,600&family=Inter:wght@500;600;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  .card{
    width:1080px;height:1080px;position:relative;overflow:hidden;
    background:
      radial-gradient(900px 560px at 50% 0%, #18391f 0%, rgba(13,36,21,0) 58%),
      #0a1a0f;
    color:#eaf3ec;font-family:'Inter',sans-serif;
    display:flex;flex-direction:column;justify-content:center;
    padding:96px 92px;
  }
  .glow{position:absolute;inset:0;
    background:radial-gradient(560px 360px at 50% 26%, rgba(232,201,106,0.10), rgba(232,201,106,0) 60%);}
  .inner{position:relative;}
  .kicker{font-size:21px;letter-spacing:.26em;text-transform:uppercase;
    color:#34d399;font-weight:600;margin-bottom:46px;}
  .lede{font-family:'Inter',sans-serif;font-weight:700;
    font-size:58px;line-height:1.16;letter-spacing:-0.6px;color:#fff;}
  .lede .dim{color:#9fb6a6;font-weight:600;}
  .rule{height:2px;width:120px;background:linear-gradient(90deg,#e8c96a,rgba(232,201,106,0));
    margin:52px 0;border-radius:2px;}
  .q{font-family:'Lora',serif;font-style:italic;font-weight:500;
    font-size:50px;line-height:1.32;color:#fff;}
  .q b{font-style:normal;font-weight:600;color:#e8c96a;}
  .foot{position:absolute;left:92px;right:92px;bottom:74px;
    display:flex;align-items:center;gap:14px;
    color:#9fb6a6;font-size:24px;font-weight:500;}
  .sprout{width:40px;height:40px;flex:0 0 40px;}
  .nm{color:#eaf3ec;font-weight:600;}
</style>
</head>
<body>
  <div class="card">
    <div class="glow"></div>
    <div class="inner">
      <div class="kicker">A question about AI &amp; our kids</div>
      <div class="lede">We're not afraid of AI seizing control.<br>
        <span class="dim">We're handing it over — one convenience at a time.</span></div>
      <div class="rule"></div>
      <div class="q">So when the machine's read on your child<br>
        clashes with your gut — <b>who should win?</b></div>
    </div>
    <div class="foot">
      <svg class="sprout" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
        <path d="M16 27 C16 27 16 20 16 16" stroke="#E8C96A" stroke-width="2.4" stroke-linecap="round" fill="none"/>
        <path d="M16 19 C9 16 4 11 8 4 C16 4 22 11 16 19 Z" fill="#34d399"/>
        <path d="M16 16 C23 13 28 7 24 1 C16 1 11 8 16 16 Z" fill="#5fe6ad"/>
      </svg>
      <span><span class="nm">Tredoux</span> · building Montree · montree.xyz</span>
    </div>
  </div>
</body>
</html>
